<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player Notes</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #121212;
        color: #eaeaea;
        font-family: Inter, Arial, sans-serif;
        padding: 16px;
        min-height: 100vh;
      }
      h1 {
        color: #7ee787;
        font-size: 20px;
        text-align: center;
        margin-bottom: 16px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
      }
      .search-wrap {
        flex: 1;
        position: relative;
      }
      .search-wrap input {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #eaeaea;
        width: 100%;
        padding: 8px 32px 8px 10px;
        font-size: 14px;
        outline: none;
      }
      .search-wrap input:focus {
        border-color: #7ee787;
      }
      .search-wrap .clear {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #8b949e;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        display: none;
      }
      .search-wrap input:not(:placeholder-shown) ~ .clear {
        display: block;
      }
      .add-btn {
        background: #7ee787;
        color: #0d1117;
        font-weight: 700;
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 14px;
        white-space: nowrap;
      }
      .add-btn:hover {
        opacity: 0.9;
      }
      .section-label {
        font-size: 11px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 12px 0 6px;
        padding-left: 2px;
      }
      .card {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
        align-items: flex-start;
      }
      .card.tabled {
        border-color: #58a6ff;
      }
      .card-body {
        flex: 1;
        min-width: 0;
      }
      .card-name {
        font-weight: 700;
        font-size: 15px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .card-name-text {
        cursor: pointer;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .card-name-text:hover {
        background: #161b22;
      }
      .card-name-edit {
        background: #161b22;
        border: 1px solid #7ee787;
        border-radius: 4px;
        color: #eaeaea;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
        padding: 1px 4px;
        outline: none;
        width: 200px;
      }
      .card-nickname {
        font-size: 13px;
        color: #8b949e;
        cursor: pointer;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .card-nickname:hover {
        background: #161b22;
      }
      .card-nickname-empty {
        font-size: 12px;
        color: #484f58;
        font-style: italic;
        cursor: pointer;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .card-nickname-empty:hover {
        background: #161b22;
      }
      .card-nickname-edit {
        background: #161b22;
        border: 1px solid #7ee787;
        border-radius: 4px;
        color: #eaeaea;
        font-size: 13px;
        font-family: inherit;
        padding: 1px 4px;
        outline: none;
        width: 150px;
      }
      .card-avatar {
        font-size: 12px;
        color: #8b949e;
        cursor: pointer;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .card-avatar:hover {
        background: #161b22;
      }
      .card-avatar-empty {
        font-size: 12px;
        color: #484f58;
        font-style: italic;
        cursor: pointer;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .card-avatar-empty:hover {
        background: #161b22;
      }
      .card-avatar-edit {
        background: #161b22;
        border: 1px solid #7ee787;
        border-radius: 4px;
        color: #eaeaea;
        font-size: 12px;
        font-family: inherit;
        padding: 1px 4px;
        outline: none;
        width: 150px;
      }
      .table-badge {
        background: #58a6ff;
        color: #0d1117;
        font-size: 11px;
        border-radius: 4px;
        padding: 1px 5px;
        font-weight: 700;
      }
      .table-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .table-tab {
        background: #21262d;
        color: #8b949e;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
      }
      .table-tab:hover {
        color: #eaeaea;
        border-color: #eaeaea;
      }
      .table-tab.active {
        background: #58a6ff;
        color: #0d1117;
        border-color: #58a6ff;
      }
      .table-select {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #eaeaea;
        padding: 4px 8px;
        font-size: 13px;
        outline: none;
        cursor: pointer;
      }
      .table-select:focus {
        border-color: #7ee787;
      }
      .card-notes {
        font-size: 13px;
        color: #8b949e;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 4px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .card-notes:hover {
        background: #161b22;
      }
      .card-notes-empty {
        font-size: 13px;
        color: #484f58;
        font-style: italic;
        margin-top: 4px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .card-notes-empty:hover {
        background: #161b22;
      }
      .card-notes-edit {
        background: #161b22;
        border: 1px solid #7ee787;
        border-radius: 4px;
        color: #eaeaea;
        width: 100%;
        padding: 4px 6px;
        font-size: 13px;
        font-family: inherit;
        margin-top: 4px;
        resize: vertical;
        min-height: 40px;
        outline: none;
      }
      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }
      .tag-chip {
        font-size: 11px;
        border-radius: 10px;
        padding: 2px 8px;
        font-weight: 600;
        color: #0d1117;
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }
      .tag-chip .tag-remove {
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        line-height: 1;
        opacity: 0.6;
      }
      .tag-chip .tag-remove:hover {
        opacity: 1;
      }
      .add-tag-wrap {
        position: relative;
        display: inline-block;
      }
      .add-tag-btn {
        font-size: 11px;
        border-radius: 10px;
        padding: 2px 8px;
        font-weight: 600;
        background: #21262d;
        color: #8b949e;
        border: 1px dashed #30363d;
        cursor: pointer;
      }
      .add-tag-btn:hover {
        color: #eaeaea;
        border-color: #eaeaea;
      }
      .add-tag-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 4px;
        z-index: 20;
        min-width: 120px;
        display: none;
      }
      .add-tag-dropdown.show {
        display: block;
      }
      .add-tag-option {
        display: block;
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        color: #eaeaea;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px;
      }
      .add-tag-option:hover {
        background: #30363d;
      }
      .add-tag-none {
        color: #484f58;
        font-size: 12px;
        padding: 4px 8px;
      }
      .modal-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }
      .modal-tag-chip {
        font-size: 12px;
        border-radius: 10px;
        padding: 3px 10px;
        font-weight: 600;
        color: #0d1117;
        cursor: pointer;
        opacity: 0.4;
        border: 2px solid transparent;
        transition: opacity 0.15s;
      }
      .modal-tag-chip.selected {
        opacity: 1;
        border-color: #7ee787;
      }
      .modal-tag-chip .remove-tag {
        margin-left: 4px;
        cursor: pointer;
        font-weight: 700;
      }
      .new-tag-form {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-top: 8px;
      }
      .new-tag-form input[type="text"] {
        width: 120px;
        padding: 4px 8px;
        font-size: 12px;
      }
      .new-tag-form input[type="color"] {
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid #30363d;
        border-radius: 4px;
        background: #161b22;
        cursor: pointer;
      }
      .new-tag-form button {
        font-size: 12px;
        padding: 4px 10px;
      }
      .manage-tags-btn {
        background: none;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #8b949e;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }
      .manage-tags-btn:hover {
        color: #eaeaea;
        border-color: #eaeaea;
      }
      .tag-filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .tag-filter-chip {
        font-size: 12px;
        border-radius: 10px;
        padding: 3px 10px;
        font-weight: 600;
        color: #0d1117;
        cursor: pointer;
        opacity: 0.5;
        border: 2px solid transparent;
        transition: opacity 0.15s;
      }
      .tag-filter-chip.active {
        opacity: 1;
        border-color: #7ee787;
      }
      .tag-manage-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .tag-manage-row input[type="color"] {
        width: 24px;
        height: 24px;
        padding: 0;
        border: 1px solid #30363d;
        border-radius: 4px;
        background: #161b22;
        cursor: pointer;
      }
      .tag-manage-row input[type="text"] {
        flex: 1;
        padding: 4px 8px;
        font-size: 13px;
      }
      .tag-manage-row .icon-btn {
        padding: 3px 6px;
        font-size: 12px;
      }
      .card-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
        align-items: center;
      }
      .icon-btn {
        background: none;
        border: 1px solid #30363d;
        border-radius: 5px;
        color: #8b949e;
        cursor: pointer;
        padding: 4px 7px;
        font-size: 14px;
        line-height: 1;
      }
      .icon-btn:hover {
        color: #eaeaea;
        border-color: #eaeaea;
      }
      .icon-btn.active {
        color: #7ee787;
        border-color: #7ee787;
      }
      .icon-btn.danger {
        color: #f85149;
        border-color: #f85149;
      }
      .confirm-inline {
        display: flex;
        gap: 4px;
        align-items: center;
        font-size: 12px;
        color: #f85149;
      }
      .confirm-inline button {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid #30363d;
      }
      .confirm-inline .yes {
        background: #f85149;
        color: #fff;
        border-color: #f85149;
      }
      .confirm-inline .no {
        background: #21262d;
        color: #eaeaea;
        border-color: #30363d;
      }
      .empty-state {
        color: #8b949e;
        text-align: center;
        padding: 40px 0;
        font-size: 14px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal-card {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 20px;
        width: min(480px, 95vw);
        position: relative;
      }
      .modal-title {
        color: #7ee787;
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 14px;
      }
      .modal-card label {
        display: block;
        font-size: 13px;
        color: #8b949e;
        margin-bottom: 4px;
        margin-top: 12px;
      }
      .modal-card label:first-of-type {
        margin-top: 0;
      }
      .modal-card input,
      .modal-card textarea {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #eaeaea;
        width: 100%;
        padding: 8px 10px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
      }
      .modal-card input:focus,
      .modal-card textarea:focus {
        border-color: #7ee787;
      }
      .modal-card textarea {
        resize: vertical;
        min-height: 80px;
      }
      .error {
        color: #f85149;
        font-size: 12px;
        margin-top: 2px;
        display: none;
      }
      .notice {
        background: #1a2a1a;
        border: 1px solid #7ee787;
        color: #7ee787;
        border-radius: 6px;
        font-size: 13px;
        padding: 8px 10px;
        margin-bottom: 12px;
        display: none;
      }
      .modal-buttons {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }
      .btn-primary {
        background: #7ee787;
        color: #0d1117;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
      .btn-secondary {
        background: #21262d;
        color: #eaeaea;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-secondary:hover {
        border-color: #eaeaea;
      }
      .modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        background: none;
        border: none;
        color: #8b949e;
        font-size: 20px;
        cursor: pointer;
        line-height: 1;
      }
      .modal-close:hover {
        color: #eaeaea;
      }
      .bulk-confirm-list {
        list-style: none;
        margin: 10px 0;
        padding: 0;
      }
      .bulk-confirm-list li {
        padding: 6px 0;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bulk-confirm-list .badge-new {
        background: #7ee787;
        color: #0d1117;
        font-size: 11px;
        border-radius: 4px;
        padding: 1px 6px;
        font-weight: 700;
      }
      .bulk-confirm-list .badge-existing {
        background: #30363d;
        color: #8b949e;
        font-size: 11px;
        border-radius: 4px;
        padding: 1px 6px;
        font-weight: 700;
      }
      .btn-danger {
        background: #f85149;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-danger:hover {
        opacity: 0.9;
      }
      .toolbar-secondary {
        justify-content: flex-start;
      }
      @media (max-width: 768px) {
        .toolbar {
          flex-wrap: wrap;
        }
        .search-wrap {
          flex: 1 1 100%;
        }
        .add-btn,
        .manage-tags-btn {
          flex: 1 1 auto;
          text-align: center;
          font-size: 13px;
          padding: 8px 10px;
        }
      }
      @media (max-width: 480px) {
        body {
          padding: 10px;
        }
        h1 {
          font-size: 17px;
          margin-bottom: 12px;
        }
        .card {
          padding: 10px;
          gap: 8px;
        }
        .modal-card {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <h1>🃏 Fish Profiles</h1>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search players…" />
        <button class="clear" id="search-clear">✕</button>
      </div>
      <button class="add-btn" id="add-btn">+ Add</button>
      <button class="manage-tags-btn" id="bulk-add-btn">+ Bulk Add</button>
    </div>
    <div class="table-tabs" id="table-tabs">
      <button class="table-tab active" data-table="0">All</button>
      <button class="table-tab" data-table="1">Table 1</button>
      <button class="table-tab" data-table="2">Table 2</button>
      <button class="table-tab" data-table="3">Table 3</button>
      <button class="table-tab" data-table="4">Table 4</button>
    </div>
    <div class="toolbar toolbar-secondary">
      <button class="manage-tags-btn" id="manage-tags-btn">🏷️ Tags</button>
      <button class="manage-tags-btn" id="export-btn">📤 Export</button>
      <button class="manage-tags-btn" id="import-btn">📥 Import</button>
      <input
        type="file"
        id="import-file"
        accept=".json"
        style="display: none"
      />
    </div>

    <div class="tag-filter-bar" id="tag-filter-bar"></div>
    <div id="list-container"></div>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-card">
        <button class="modal-close" id="modal-close">✕</button>
        <div class="modal-title" id="modal-title">Add Player</div>
        <div class="notice" id="modal-notice">
          Player not found — create them?
        </div>
        <label for="username-input">Username</label>
        <input type="text" id="username-input" autocomplete="off" />
        <div class="error" id="username-error">
          Username is required and must be unique.
        </div>
        <label for="notes-input">Notes</label>
        <textarea id="notes-input" rows="4"></textarea>
        <label for="table-input">Table</label>
        <select class="table-select" id="table-input">
          <option value="0">No Table</option>
          <option value="1">Table 1</option>
          <option value="2">Table 2</option>
          <option value="3">Table 3</option>
          <option value="4">Table 4</option>
        </select>
        <label>Tags</label>
        <div class="modal-tags" id="modal-tags"></div>
        <div class="new-tag-form" id="new-tag-form">
          <input
            type="text"
            id="new-tag-label"
            placeholder="New tag…"
            autocomplete="off"
          />
          <input type="color" id="new-tag-color" value="#7ee787" />
          <button class="btn-secondary" id="new-tag-add" type="button">
            +
          </button>
        </div>
        <div class="modal-buttons">
          <button class="btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn-primary" id="modal-save">Save</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="tags-modal-overlay">
      <div class="modal-card">
        <button class="modal-close" id="tags-modal-close">✕</button>
        <div class="modal-title">Manage Tags</div>
        <div id="tags-manage-list"></div>
        <div class="new-tag-form" style="margin-top: 12px">
          <input
            type="text"
            id="manage-new-tag-label"
            placeholder="New tag…"
            autocomplete="off"
          />
          <input type="color" id="manage-new-tag-color" value="#7ee787" />
          <button class="btn-primary" id="manage-new-tag-add" type="button">
            + Add
          </button>
        </div>
        <div class="modal-buttons">
          <button class="btn-secondary" id="tags-modal-done">Done</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="bulk-add-overlay">
      <div class="modal-card">
        <button class="modal-close" id="bulk-add-close">✕</button>
        <div class="modal-title">Bulk Add Players</div>
        <label for="bulk-add-input">Usernames (one per line)</label>
        <textarea
          id="bulk-add-input"
          rows="8"
          placeholder="user1&#10;user2&#10;user3"
        ></textarea>
        <button
          class="btn-secondary"
          id="bulk-add-clean"
          type="button"
          style="margin-top: 8px"
        >
          🧹 Clean
        </button>
        <label for="bulk-table-input">Table</label>
        <select class="table-select" id="bulk-table-input">
          <option value="0">No Table</option>
          <option value="1">Table 1</option>
          <option value="2">Table 2</option>
          <option value="3">Table 3</option>
          <option value="4">Table 4</option>
        </select>
        <div class="modal-buttons">
          <button class="btn-secondary" id="bulk-add-cancel">Cancel</button>
          <button class="btn-primary" id="bulk-add-submit">Continue</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="bulk-confirm-overlay">
      <div class="modal-card">
        <button class="modal-close" id="bulk-confirm-close">✕</button>
        <div class="modal-title">Bulk Add Players</div>
        <ul class="bulk-confirm-list" id="bulk-confirm-list"></ul>
        <div class="modal-buttons">
          <button class="btn-secondary" id="bulk-confirm-cancel">Cancel</button>
          <button class="btn-primary" id="bulk-confirm-add">Add All</button>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "poker_player_notes";
      const TAGS_KEY = "poker_player_notes_tags";
      const TABLE_KEY = "poker_table_assignments";

      // --- Table Assignments (session-based) ---
      function loadTableAssignments() {
        try {
          return JSON.parse(sessionStorage.getItem(TABLE_KEY)) || {};
        } catch {
          return {};
        }
      }
      function saveTableAssignments(assignments) {
        sessionStorage.setItem(TABLE_KEY, JSON.stringify(assignments));
      }
      function getPlayerTable(username) {
        const a = loadTableAssignments();
        return a[username.toLowerCase()] || 0;
      }
      function setPlayerTable(username, table) {
        const a = loadTableAssignments();
        if (table === 0) {
          delete a[username.toLowerCase()];
        } else {
          a[username.toLowerCase()] = table;
        }
        saveTableAssignments(a);
      }

      // --- Data Layer ---
      function loadPlayers() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          return [];
        }
      }

      function savePlayers(players) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
      }

      function findPlayer(players, username) {
        const lower = username.toLowerCase();
        return players.find((p) => p.username.toLowerCase() === lower);
      }

      function upsertPlayer(players, data) {
        const idx = players.findIndex(
          (p) => p.username.toLowerCase() === data.username.toLowerCase(),
        );
        const now = new Date().toISOString();
        if (idx !== -1) {
          players[idx].notes = data.notes;
          players[idx].updatedAt = now;
          if (data.tags !== undefined) players[idx].tags = data.tags;
        } else {
          players.push({
            username: data.username,
            notes: data.notes || "",
            tags: data.tags || [],
            updatedAt: now,
          });
        }
        if (data.table !== undefined) {
          setPlayerTable(data.username, data.table);
        }
        return players;
      }

      // --- Tag Data Layer ---
      function loadTags() {
        try {
          return JSON.parse(localStorage.getItem(TAGS_KEY)) || [];
        } catch {
          return [];
        }
      }

      function saveTags(tags) {
        localStorage.setItem(TAGS_KEY, JSON.stringify(tags));
      }

      function addTag(tags, label, color) {
        const id = Date.now().toString();
        tags.push({ id, label, color });
        return id;
      }

      function deleteTagGlobal(tagId) {
        let tags = loadTags();
        tags = tags.filter((t) => t.id !== tagId);
        saveTags(tags);
        let players = loadPlayers();
        players.forEach((p) => {
          if (p.tags) p.tags = p.tags.filter((id) => id !== tagId);
        });
        savePlayers(players);
      }

      function deletePlayer(players, username) {
        const lower = username.toLowerCase();
        return players.filter((p) => p.username.toLowerCase() !== lower);
      }

      function sortedPlayers(players, query) {
        let filtered = players;
        if (query) {
          const q = query.toLowerCase();
          filtered = players.filter(
            (p) =>
              p.username.toLowerCase().includes(q) ||
              (p.nickname && p.nickname.toLowerCase().includes(q)),
          );
        }
        if (activeTagFilters.length) {
          filtered = filtered.filter((p) =>
            activeTagFilters.every((id) => (p.tags || []).includes(id)),
          );
        }
        if (activeTableFilter > 0) {
          filtered = filtered.filter(
            (p) => getPlayerTable(p.username) === activeTableFilter,
          );
        }
        return filtered.sort((a, b) =>
          (b.updatedAt || "").localeCompare(a.updatedAt || ""),
        );
      }

      // --- Render Layer ---
      let currentQuery = "";
      let activeTagFilters = [];
      let activeTableFilter = 0;

      function renderTagFilterBar() {
        const tags = loadTags();
        const bar = document.getElementById("tag-filter-bar");
        if (!tags.length) {
          bar.innerHTML = "";
          return;
        }
        bar.innerHTML = tags
          .map((t) => {
            const active = activeTagFilters.includes(t.id) ? " active" : "";
            return `<span class="tag-filter-chip${active}" data-tag-id="${escapeHTML(t.id)}" style="background:${escapeHTML(t.color)}">${escapeHTML(t.label)}</span>`;
          })
          .join("");
      }

      document
        .getElementById("tag-filter-bar")
        .addEventListener("click", function (e) {
          const chip = e.target.closest(".tag-filter-chip");
          if (!chip) return;
          const id = chip.getAttribute("data-tag-id");
          if (activeTagFilters.includes(id)) {
            activeTagFilters = activeTagFilters.filter((t) => t !== id);
          } else {
            activeTagFilters.push(id);
          }
          renderTagFilterBar();
          renderList();
        });

      function escapeHTML(str) {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }

      function buildCard(player) {
        const table = getPlayerTable(player.username);
        const tabledClass = table > 0 ? " tabled" : "";
        const allTags = loadTags();
        const playerTagIds = player.tags || [];
        const tagChips = playerTagIds
          .map((id) => {
            const t = allTags.find((tg) => tg.id === id);
            return t
              ? `<span class="tag-chip" style="background:${escapeHTML(t.color)}">${escapeHTML(t.label)}<span class="tag-remove" data-action="remove-tag" data-tag-id="${escapeHTML(t.id)}" data-username="${escapeHTML(player.username)}">×</span></span>`
              : "";
          })
          .join("");
        const notesHtml = player.notes
          ? `<div class="card-notes" data-action="edit-notes" data-username="${escapeHTML(player.username)}">${escapeHTML(player.notes)}</div>`
          : `<div class="card-notes-empty" data-action="edit-notes" data-username="${escapeHTML(player.username)}">+ add notes</div>`;
        const tableBadge =
          table > 0 ? ` <span class="table-badge">T${table}</span>` : "";
        const tableOptions = [0, 1, 2, 3, 4]
          .map(
            (t) =>
              `<option value="${t}"${t === table ? " selected" : ""}>${t === 0 ? "No Table" : "Table " + t}</option>`,
          )
          .join("");
        return `<div class="card${tabledClass}" data-username="${escapeHTML(player.username)}">
    <div class="card-body">
      <div class="card-name"><span class="card-name-text" data-action="edit-username" data-username="${escapeHTML(player.username)}">${escapeHTML(player.username)}</span>${player.nickname ? ` <span class="card-nickname" data-action="edit-nickname" data-username="${escapeHTML(player.username)}">(${escapeHTML(player.nickname)})</span>` : ` <span class="card-nickname-empty" data-action="edit-nickname" data-username="${escapeHTML(player.username)}">+ nickname</span>`}${player.avatar ? ` <span class="card-avatar" data-action="edit-avatar" data-username="${escapeHTML(player.username)}">[${escapeHTML(player.avatar)}]</span>` : ` <span class="card-avatar-empty" data-action="edit-avatar" data-username="${escapeHTML(player.username)}">+ avatar</span>`}${tableBadge}</div>
      ${notesHtml}
      <div class="card-tags">${tagChips}<span class="add-tag-wrap"><button class="add-tag-btn" data-action="add-tag" data-username="${escapeHTML(player.username)}">+ tag</button><div class="add-tag-dropdown" id="tag-dd-${escapeHTML(player.username)}"></div></span></div>
    </div>
    <div class="card-actions">
      <select class="table-select" data-action="set-table" data-username="${escapeHTML(player.username)}">${tableOptions}</select>
      <button class="icon-btn danger" data-action="delete" data-username="${escapeHTML(player.username)}" title="Delete">🗑️</button>
    </div>
  </div>`;
      }

      function renderList() {
        renderTagFilterBar();
        renderTableTabs();
        const container = document.getElementById("list-container");
        const players = loadPlayers();
        const sorted = sortedPlayers(players, currentQuery);
        let html = "";

        if (sorted.length === 0) {
          html = `<div class="empty-state">${currentQuery || activeTableFilter ? "No players match your filter." : 'No players yet. Tap "+ Add" to get started.'}</div>`;
          container.innerHTML = html;
          return;
        }

        const label =
          activeTableFilter > 0 ? `Table ${activeTableFilter}` : "All Players";
        html += `<div class="section-label">${label} (${sorted.length})</div>`;
        sorted.forEach((p) => {
          html += buildCard(p);
        });

        container.innerHTML = html;
      }

      function renderTableTabs() {
        document.querySelectorAll(".table-tab").forEach((tab) => {
          const t = parseInt(tab.getAttribute("data-table"));
          tab.classList.toggle("active", t === activeTableFilter);
        });
      }

      // --- Modal Logic ---
      let modalIsEdit = false;
      let modalOriginalUsername = "";
      let modalSelectedTags = [];

      function renderModalTags() {
        const allTags = loadTags();
        const container = document.getElementById("modal-tags");
        container.innerHTML = allTags
          .map((t) => {
            const sel = modalSelectedTags.includes(t.id) ? " selected" : "";
            return `<span class="modal-tag-chip${sel}" data-tag-id="${escapeHTML(t.id)}" style="background:${escapeHTML(t.color)}">${escapeHTML(t.label)}</span>`;
          })
          .join("");
      }

      function openModal({
        username = "",
        notes = "",
        isEdit = false,
        showNotice = false,
        tags = [],
        table = 0,
      } = {}) {
        modalIsEdit = isEdit;
        modalOriginalUsername = username;
        modalSelectedTags = [...tags];
        document.getElementById("modal-title").textContent = isEdit
          ? "Edit Player"
          : "Add Player";
        document.getElementById("username-input").value = username;
        document.getElementById("username-input").disabled = false;
        document.getElementById("notes-input").value = notes;
        document.getElementById("table-input").value = table;
        document.getElementById("username-error").style.display = "none";
        document.getElementById("modal-notice").style.display = showNotice
          ? "block"
          : "none";
        document.getElementById("new-tag-label").value = "";
        renderModalTags();
        document.getElementById("modal-overlay").classList.add("show");
        const focus = isEdit ? "notes-input" : "username-input";
        setTimeout(() => document.getElementById(focus).focus(), 50);
      }

      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("show");
      }

      // --- Event Layer ---
      document
        .getElementById("list-container")
        .addEventListener("click", function (e) {
          const btn = e.target.closest("[data-action]");
          if (!btn) return;
          const action = btn.getAttribute("data-action");
          const username = btn.getAttribute("data-username");
          let players = loadPlayers();

          if (action === "edit-avatar") {
            const el = btn;
            const username = el.getAttribute("data-username");
            const p = findPlayer(players, username);
            if (!p) return;
            const input = document.createElement("input");
            input.type = "text";
            input.className = "card-avatar-edit";
            input.value = p.avatar || "";
            input.placeholder = "Avatar desc…";
            el.replaceWith(input);
            input.focus();
            input.select();
            let saved = false;
            function saveAvatar() {
              if (saved) return;
              saved = true;
              let players = loadPlayers();
              const p = findPlayer(players, username);
              if (p) {
                p.avatar = input.value.trim();
                p.updatedAt = new Date().toISOString();
                savePlayers(players);
              }
              renderList();
            }
            input.addEventListener("blur", saveAvatar);
            input.addEventListener("keydown", function (ev) {
              if (ev.key === "Enter") input.blur();
              if (ev.key === "Escape") {
                saved = true;
                renderList();
              }
            });
          } else if (action === "edit-nickname") {
            const el = btn;
            const username = el.getAttribute("data-username");
            const p = findPlayer(players, username);
            if (!p) return;
            const input = document.createElement("input");
            input.type = "text";
            input.className = "card-nickname-edit";
            input.value = p.nickname || "";
            input.placeholder = "Nickname…";
            el.replaceWith(input);
            input.focus();
            input.select();
            let saved = false;
            function saveNickname() {
              if (saved) return;
              saved = true;
              let players = loadPlayers();
              const p = findPlayer(players, username);
              if (p) {
                p.nickname = input.value.trim();
                p.updatedAt = new Date().toISOString();
                savePlayers(players);
              }
              renderList();
            }
            input.addEventListener("blur", saveNickname);
            input.addEventListener("keydown", function (ev) {
              if (ev.key === "Enter") input.blur();
              if (ev.key === "Escape") {
                saved = true;
                renderList();
              }
            });
          } else if (action === "edit-username") {
            const el = btn;
            const oldUsername = el.getAttribute("data-username");
            const input = document.createElement("input");
            input.type = "text";
            input.className = "card-name-edit";
            input.value = oldUsername;
            el.replaceWith(input);
            input.focus();
            input.select();
            let saved = false;
            function saveUsername() {
              if (saved) return;
              saved = true;
              const newUsername = input.value.trim();
              if (
                !newUsername ||
                newUsername.toLowerCase() === oldUsername.toLowerCase()
              ) {
                renderList();
                return;
              }
              let players = loadPlayers();
              if (findPlayer(players, newUsername)) {
                alert("A player with that username already exists.");
                renderList();
                return;
              }
              const p = findPlayer(players, oldUsername);
              if (p) {
                p.username = newUsername;
                p.updatedAt = new Date().toISOString();
                savePlayers(players);
              }
              renderList();
            }
            input.addEventListener("blur", saveUsername);
            input.addEventListener("keydown", function (ev) {
              if (ev.key === "Enter") input.blur();
              if (ev.key === "Escape") {
                saved = true;
                renderList();
              }
            });
          } else if (action === "edit-notes") {
            const el = btn;
            const username = el.getAttribute("data-username");
            const p = findPlayer(players, username);
            if (!p) return;
            const textarea = document.createElement("textarea");
            textarea.className = "card-notes-edit";
            textarea.value = p.notes || "";
            el.replaceWith(textarea);
            textarea.focus();
            function saveNotes() {
              let players = loadPlayers();
              const p = findPlayer(players, username);
              if (p) {
                p.notes = textarea.value.trim();
                p.updatedAt = new Date().toISOString();
                savePlayers(players);
              }
              renderList();
            }
            textarea.addEventListener("blur", saveNotes);
            textarea.addEventListener("keydown", function (ev) {
              if (ev.key === "Escape") {
                textarea.blur();
              }
            });
          } else if (action === "remove-tag") {
            const tagId = btn.getAttribute("data-tag-id");
            const username = btn.getAttribute("data-username");
            const p = findPlayer(players, username);
            if (p) {
              p.tags = (p.tags || []).filter((id) => id !== tagId);
              p.updatedAt = new Date().toISOString();
              savePlayers(players);
              renderList();
            }
          } else if (action === "add-tag") {
            const username = btn.getAttribute("data-username");
            const p = findPlayer(players, username);
            if (!p) return;
            const dd = btn.nextElementSibling;
            // Close any other open dropdowns
            document
              .querySelectorAll(".add-tag-dropdown.show")
              .forEach((d) => d.classList.remove("show"));
            const allTags = loadTags();
            const available = allTags.filter(
              (t) => !(p.tags || []).includes(t.id),
            );
            if (!available.length) {
              dd.innerHTML = '<div class="add-tag-none">No more tags</div>';
            } else {
              dd.innerHTML = available
                .map(
                  (t) =>
                    `<button class="add-tag-option" data-action="pick-tag" data-tag-id="${escapeHTML(t.id)}" data-username="${escapeHTML(username)}">${escapeHTML(t.label)}</button>`,
                )
                .join("");
            }
            dd.classList.toggle("show");
            e.stopPropagation();
          } else if (action === "pick-tag") {
            const tagId = btn.getAttribute("data-tag-id");
            const username = btn.getAttribute("data-username");
            const p = findPlayer(players, username);
            if (p) {
              if (!p.tags) p.tags = [];
              if (!p.tags.includes(tagId)) p.tags.push(tagId);
              p.updatedAt = new Date().toISOString();
              savePlayers(players);
              renderList();
            }
          } else if (action === "delete") {
            const card = btn.closest(".card");
            const actions = card.querySelector(".card-actions");
            actions.innerHTML = `<div class="confirm-inline">Delete? <button class="yes" data-action="confirm-del" data-username="${escapeHTML(username)}">Yes</button> <button class="no" data-action="cancel-del">No</button></div>`;
          } else if (action === "confirm-del") {
            players = deletePlayer(players, username);
            savePlayers(players);
            renderList();
          } else if (action === "cancel-del") {
            renderList();
          }
        });

      // Handle table select changes on cards
      document
        .getElementById("list-container")
        .addEventListener("change", function (e) {
          if (e.target.getAttribute("data-action") === "set-table") {
            const username = e.target.getAttribute("data-username");
            setPlayerTable(username, parseInt(e.target.value));
            renderList();
          }
        });

      document
        .getElementById("search-input")
        .addEventListener("input", function () {
          currentQuery = this.value;
          renderList();
        });

      // Close tag dropdowns when clicking outside
      document.addEventListener("click", function (e) {
        if (!e.target.closest(".add-tag-wrap")) {
          document
            .querySelectorAll(".add-tag-dropdown.show")
            .forEach((d) => d.classList.remove("show"));
        }
      });

      document
        .getElementById("search-clear")
        .addEventListener("click", function () {
          document.getElementById("search-input").value = "";
          currentQuery = "";
          renderList();
        });

      document.getElementById("add-btn").addEventListener("click", function () {
        openModal();
      });

      document
        .getElementById("table-tabs")
        .addEventListener("click", function (e) {
          const tab = e.target.closest(".table-tab");
          if (!tab) return;
          activeTableFilter = parseInt(tab.getAttribute("data-table"));
          renderList();
        });

      document
        .getElementById("modal-close")
        .addEventListener("click", closeModal);
      document
        .getElementById("modal-cancel")
        .addEventListener("click", closeModal);

      document
        .getElementById("modal-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeModal();
        });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeModal();
      });

      document
        .getElementById("modal-save")
        .addEventListener("click", function () {
          const usernameInput = document.getElementById("username-input");
          const notesInput = document.getElementById("notes-input");
          const username = usernameInput.value.trim();
          const notes = notesInput.value.trim();
          const errorEl = document.getElementById("username-error");

          if (!username) {
            errorEl.textContent = "Username is required.";
            errorEl.style.display = "block";
            return;
          }

          let players = loadPlayers();

          if (!modalIsEdit && findPlayer(players, username)) {
            errorEl.textContent = "A player with that username already exists.";
            errorEl.style.display = "block";
            return;
          }

          if (
            modalIsEdit &&
            username.toLowerCase() !== modalOriginalUsername.toLowerCase() &&
            findPlayer(players, username)
          ) {
            errorEl.textContent = "A player with that username already exists.";
            errorEl.style.display = "block";
            return;
          }

          if (
            modalIsEdit &&
            username.toLowerCase() !== modalOriginalUsername.toLowerCase()
          ) {
            const idx = players.findIndex(
              (p) =>
                p.username.toLowerCase() ===
                modalOriginalUsername.toLowerCase(),
            );
            if (idx !== -1) players[idx].username = username;
          }

          players = upsertPlayer(players, {
            username: username,
            notes,
            tags: modalSelectedTags,
            table: parseInt(document.getElementById("table-input").value),
          });
          savePlayers(players);
          closeModal();
          renderList();
        });

      // --- Modal Tag Events ---
      document
        .getElementById("modal-tags")
        .addEventListener("click", function (e) {
          const chip = e.target.closest(".modal-tag-chip");
          if (!chip) return;
          const id = chip.getAttribute("data-tag-id");
          if (modalSelectedTags.includes(id)) {
            modalSelectedTags = modalSelectedTags.filter((t) => t !== id);
          } else {
            modalSelectedTags.push(id);
          }
          renderModalTags();
        });

      document
        .getElementById("new-tag-add")
        .addEventListener("click", function () {
          const label = document.getElementById("new-tag-label").value.trim();
          const color = document.getElementById("new-tag-color").value;
          if (!label) return;
          const tags = loadTags();
          const id = addTag(tags, label, color);
          saveTags(tags);
          modalSelectedTags.push(id);
          document.getElementById("new-tag-label").value = "";
          renderModalTags();
        });

      // --- Manage Tags Modal ---
      function renderTagsManager() {
        const tags = loadTags();
        const container = document.getElementById("tags-manage-list");
        if (!tags.length) {
          container.innerHTML =
            '<div style="color:#8b949e;font-size:13px;padding:8px 0">No tags defined yet.</div>';
          return;
        }
        container.innerHTML = tags
          .map(
            (
              t,
            ) => `<div class="tag-manage-row" data-tag-id="${escapeHTML(t.id)}">
    <input type="color" value="${escapeHTML(t.color)}" data-action="recolor">
    <input type="text" value="${escapeHTML(t.label)}" data-action="rename">
    <button class="icon-btn danger" data-action="delete-tag" title="Delete">🗑️</button>
  </div>`,
          )
          .join("");
      }

      document
        .getElementById("manage-tags-btn")
        .addEventListener("click", function () {
          renderTagsManager();
          document.getElementById("tags-modal-overlay").classList.add("show");
        });

      document
        .getElementById("tags-modal-close")
        .addEventListener("click", function () {
          document
            .getElementById("tags-modal-overlay")
            .classList.remove("show");
          renderList();
        });
      document
        .getElementById("tags-modal-done")
        .addEventListener("click", function () {
          document
            .getElementById("tags-modal-overlay")
            .classList.remove("show");
          renderList();
        });
      document
        .getElementById("tags-modal-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            this.classList.remove("show");
            renderList();
          }
        });

      document
        .getElementById("tags-manage-list")
        .addEventListener("click", function (e) {
          const btn = e.target.closest('[data-action="delete-tag"]');
          if (!btn) return;
          const row = btn.closest(".tag-manage-row");
          const id = row.getAttribute("data-tag-id");
          deleteTagGlobal(id);
          renderTagsManager();
        });

      document
        .getElementById("tags-manage-list")
        .addEventListener("change", function (e) {
          const row = e.target.closest(".tag-manage-row");
          if (!row) return;
          const id = row.getAttribute("data-tag-id");
          const tags = loadTags();
          const tag = tags.find((t) => t.id === id);
          if (!tag) return;
          if (e.target.getAttribute("data-action") === "recolor")
            tag.color = e.target.value;
          if (e.target.getAttribute("data-action") === "rename")
            tag.label = e.target.value.trim();
          saveTags(tags);
        });

      document
        .getElementById("manage-new-tag-add")
        .addEventListener("click", function () {
          const label = document
            .getElementById("manage-new-tag-label")
            .value.trim();
          const color = document.getElementById("manage-new-tag-color").value;
          if (!label) return;
          const tags = loadTags();
          addTag(tags, label, color);
          saveTags(tags);
          document.getElementById("manage-new-tag-label").value = "";
          renderTagsManager();
        });

      document
        .getElementById("bulk-add-btn")
        .addEventListener("click", function () {
          document.getElementById("bulk-add-input").value = "";
          document.getElementById("bulk-add-overlay").classList.add("show");
          setTimeout(
            () => document.getElementById("bulk-add-input").focus(),
            50,
          );
        });
      document
        .getElementById("bulk-add-close")
        .addEventListener("click", function () {
          document.getElementById("bulk-add-overlay").classList.remove("show");
        });
      document
        .getElementById("bulk-add-cancel")
        .addEventListener("click", function () {
          document.getElementById("bulk-add-overlay").classList.remove("show");
        });
      document
        .getElementById("bulk-add-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) this.classList.remove("show");
        });
      document
        .getElementById("bulk-add-clean")
        .addEventListener("click", function () {
          const ta = document.getElementById("bulk-add-input");
          ta.value = ta.value
            .split("\n")
            .map((l) => l.trim())
            .filter((l) => l.length >= 3)
            .filter((l) => !l.includes(" BB"))
            .filter((l) => !l.includes("GHANDC"))
            .filter((l) => !l.includes("CAMEIOC"))
            .filter((l) => !l.includes("смотт"))
            .filter((l) => !l.includes("quadmonkey"))
            .filter((l) => !l.includes("HANDS"))
            .filter((l) => !l.includes("GAME LOG"))
            .filter((l) => !l.includes("POKER FLIPS"))
            .filter((l) => !l.includes("9 EMOJI"))
            .filter((l) => l !== "High card")
            .filter((l) => l !== "WPT Global")
            .join("\n");
        });

      document
        .getElementById("bulk-add-submit")
        .addEventListener("click", function () {
          const text = document.getElementById("bulk-add-input").value;
          const usernames = text
            .split("\n")
            .map((u) => u.trim())
            .filter(Boolean);
          if (!usernames.length) return;
          const table = parseInt(
            document.getElementById("bulk-table-input").value,
          );
          document.getElementById("bulk-add-overlay").classList.remove("show");
          openBulkConfirmModal(usernames, table);
        });

      // --- Bulk Confirm Modal ---
      let bulkConfirmUsernames = [];
      let bulkConfirmTable = 0;

      function openBulkConfirmModal(usernames, table) {
        bulkConfirmUsernames = usernames;
        bulkConfirmTable = table;
        const players = loadPlayers();
        const list = document.getElementById("bulk-confirm-list");
        list.innerHTML = usernames
          .map((u) => {
            const existing = findPlayer(players, u);
            const badge = existing
              ? '<span class="badge-existing">EXISTING</span>'
              : '<span class="badge-new">NEW</span>';
            const tableLabel = table > 0 ? ` → Table ${table}` : "";
            return `<li>${escapeHTML(u)} ${badge}${tableLabel}</li>`;
          })
          .join("");
        document.getElementById("bulk-confirm-overlay").classList.add("show");
      }

      function closeBulkConfirmModal() {
        document
          .getElementById("bulk-confirm-overlay")
          .classList.remove("show");
      }

      function executeBulkAdd() {
        let players = loadPlayers();
        bulkConfirmUsernames.forEach((u) => {
          const existing = findPlayer(players, u);
          if (!existing) {
            players = upsertPlayer(players, {
              username: u,
              notes: "",
              tags: [],
            });
          }
          setPlayerTable(u, bulkConfirmTable);
        });
        savePlayers(players);
        closeBulkConfirmModal();
        renderList();
      }

      document
        .getElementById("bulk-confirm-add")
        .addEventListener("click", () => executeBulkAdd());
      document
        .getElementById("bulk-confirm-cancel")
        .addEventListener("click", closeBulkConfirmModal);
      document
        .getElementById("bulk-confirm-close")
        .addEventListener("click", closeBulkConfirmModal);
      document
        .getElementById("bulk-confirm-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeBulkConfirmModal();
        });

      // --- Export / Import ---
      document
        .getElementById("export-btn")
        .addEventListener("click", function () {
          const data = { players: loadPlayers(), tags: loadTags() };
          const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download =
            "fish-profiles-" + new Date().toISOString().slice(0, 10) + ".json";
          a.click();
          URL.revokeObjectURL(url);
        });

      document
        .getElementById("import-btn")
        .addEventListener("click", function () {
          document.getElementById("import-file").click();
        });

      document
        .getElementById("import-file")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (ev) {
            try {
              const data = JSON.parse(ev.target.result);
              if (!data.players || !Array.isArray(data.players)) {
                alert("Invalid file: missing players array.");
                return;
              }
              // Merge tags
              if (Array.isArray(data.tags)) {
                let existingTags = loadTags();
                const existingIds = new Set(existingTags.map((t) => t.id));
                data.tags.forEach((t) => {
                  if (!existingIds.has(t.id)) existingTags.push(t);
                });
                saveTags(existingTags);
              }
              // Merge players — concat notes with newline
              let players = loadPlayers();
              data.players.forEach((imported) => {
                const idx = players.findIndex(
                  (p) =>
                    p.username.toLowerCase() ===
                    imported.username.toLowerCase(),
                );
                if (idx !== -1) {
                  const oldNotes = players[idx].notes || "";
                  const newNotes = imported.notes || "";
                  if (newNotes && oldNotes) {
                    players[idx].notes = oldNotes + "\n" + newNotes;
                  } else if (newNotes) {
                    players[idx].notes = newNotes;
                  }
                  players[idx].updatedAt = new Date().toISOString();
                  if (imported.tags) {
                    const existing = new Set(players[idx].tags || []);
                    imported.tags.forEach((t) => existing.add(t));
                    players[idx].tags = [...existing];
                  }
                } else {
                  players.push({
                    username: imported.username,
                    notes: imported.notes || "",
                    tags: imported.tags || [],
                    updatedAt: new Date().toISOString(),
                  });
                }
              });
              savePlayers(players);
              renderList();
              alert("Imported " + data.players.length + " player(s).");
            } catch (err) {
              alert("Failed to import: " + err.message);
            }
          };
          reader.readAsText(file);
          this.value = "";
        });

      // --- Deep-Link Handler ---
      (function handleDeepLink() {
        const params = new URLSearchParams(window.location.search);

        const tableUsernames = params.get("table_usernames");
        const tableNum = parseInt(params.get("table") || "1");
        if (tableUsernames) {
          history.replaceState({}, "", window.location.pathname);
          const usernames = tableUsernames
            .split(",")
            .map((u) => u.trim())
            .filter(Boolean);
          if (usernames.length) {
            renderList();
            openBulkConfirmModal(usernames, tableNum);
            return;
          }
        }

        const username = params.get("username");
        if (!username) {
          renderList();
          return;
        }

        history.replaceState({}, "", window.location.pathname);
        let players = loadPlayers();
        const player = findPlayer(players, username);

        if (player) {
          renderList();
          const card = document.querySelector(
            `.card[data-username="${CSS.escape(player.username)}"]`,
          );
          if (card)
            card.scrollIntoView({ behavior: "smooth", block: "center" });
          openModal({
            username: player.username,
            notes: player.notes,
            isEdit: true,
            tags: player.tags || [],
            table: getPlayerTable(player.username),
          });
        } else {
          openModal({ username, showNotice: true });
          renderList();
        }
      })();
    </script>
  </body>
</html>
